name: Deploy Lambda

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-lambda.yml"
      - ".github/scripts/notify-deploy.sh"

concurrency:
  group: lambda-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Deploy Lambda (code + infrastructure)
        working-directory: backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
        run: |
          cp ../packages/shared/src/countries.ts src/shared/countries.ts
          cp ../packages/shared/src/jobCounts.ts src/shared/jobCounts.ts
          cp ../packages/shared/src/scrapeRegions.ts src/shared/scrapeRegions.ts
          sam build
          sam deploy --no-confirm-changeset

      - name: Notify deploy success
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEPLOY_NOTIFY_EMAIL: ${{ vars.DEPLOY_NOTIFY_EMAIL || 'dimitar@dimitar.ai' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'LinkedIn Finder <onboarding@resend.dev>' }}
        run: |
          bash .github/scripts/notify-deploy.sh "Lambda" success \
            "Region: ${{ vars.AWS_REGION || 'eu-central-1' }}"

      - name: Notify deploy failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEPLOY_NOTIFY_EMAIL: ${{ vars.DEPLOY_NOTIFY_EMAIL || 'dimitar@dimitar.ai' }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM || 'LinkedIn Finder <onboarding@resend.dev>' }}
        run: |
          bash .github/scripts/notify-deploy.sh "Lambda" failure \
            "Region: ${{ vars.AWS_REGION || 'eu-central-1' }}"
