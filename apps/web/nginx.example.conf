# Example nginx config for EC2 — serves SPA and OG previews for social crawlers.
#
# Set API_URL to your API Gateway base URL (no trailing slash).
# Example: https://z8q1cuu3g3.execute-api.eu-central-1.amazonaws.com

map $http_user_agent $is_social_crawler {
    default 0;
    ~*(facebookexternalhit|linkedinbot|twitterbot|slackbot|whatsapp|telegrambot|discordbot|pinterest) 1;
}

server {
    listen 80;
    server_name _;

    root /var/www/jobs-reporter;
    index index.html;

    set $api_url "https://z8q1cuu3g3.execute-api.eu-central-1.amazonaws.com";

    location ~ ^/analyses/([^/]+)$ {
        if ($is_social_crawler) {
            rewrite ^ /__og_analysis/$1 last;
        }
        try_files $uri /index.html;
    }

    location ~ ^/__og_analysis/(.+)$ {
        internal;
        proxy_pass $api_url/share/analyses/$1;
        proxy_set_header Host $proxy_host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
