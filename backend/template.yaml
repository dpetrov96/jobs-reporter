AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: LinkedIn job finder — serverless (SAM)

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        EMAIL_PROVIDER: !Ref EmailProvider
        EMAIL_FROM: !Ref EmailFrom
        REPORT_EMAIL_TO: !Ref ReportEmailTo
        RESEND_API_KEY: !Ref ResendApiKey
        APP_STAGE: !Ref AppStage
        JOB_KEYWORDS: !Ref JobKeywords
        JOB_COUNTRIES: !Ref JobCountries
        JOB_LOCATION: !Ref JobLocation
        LINKEDIN_GEO_ID: !Ref LinkedInGeoId
        JOB_POSTED_WITHIN: !Ref JobPostedWithin
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "*"
      AllowHeaders:
        - Content-Type
        - Authorization
      AllowMethods:
        - GET
        - POST
        - OPTIONS

Parameters:
  AppStage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod

  EmailProvider:
    Type: String
    Default: resend
    AllowedValues:
      - resend
      - ses
    Description: resend = easier local dev; ses = native AWS (verify domain in SES first)

  EmailFrom:
    Type: String
    Default: "LinkedIn Finder <onboarding@resend.dev>"
    Description: Sender address (Resend test domain or verified SES identity)

  ReportEmailTo:
    Type: String
    Default: ""
    Description: Default recipient for job reports and test emails

  ResendApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Required when EmailProvider=resend

  JobKeywords:
    Type: String
    Default: "python developer,node.js developer,fullstack developer,front-end developer,ai engineer,react native"
    Description: Comma-separated LinkedIn search keywords (20 newest per keyword)

  JobCountries:
    Type: String
    Default: "BG,FR,DE,NL,GB,BE,PL"
    Description: Comma-separated country codes (BG,FR,DE,NL,GB,BE,PL) or "all"

  JobCountriesUs:
    Type: String
    Default: "US"
    Description: Country codes for the US scraper (default United States)

  ScrapeRegion:
    Type: String
    Default: europe
    AllowedValues:
      - europe
      - usa
    Description: Scrape region for FetchJobsFunction (europe = Sofia schedule)

  ScrapeRegionUs:
    Type: String
    Default: usa
    AllowedValues:
      - usa
    Description: Scrape region for FetchJobsUsFunction

  JobLocation:
    Type: String
    Default: Bulgaria
    Description: Legacy single-country fallback for local scripts

  LinkedInGeoId:
    Type: String
    Default: "105333783"
    Description: Legacy single-country geoId fallback

  JobPostedWithin:
    Type: String
    Default: "r3600"
    Description: LinkedIn f_TPR recency filter (r3600=1h, r86400=24h, r604800=7d)

  RunsTableName:
    Type: String
    Default: dev-linkedin-finder-runs
    Description: Existing DynamoDB table for fetch run history

  ManualFetchCooldownMinutes:
    Type: Number
    Default: 30
    Description: Minimum minutes between manual UI fetch triggers

  ManualFetchMinGapMinutes:
    Type: Number
    Default: 5
    Description: Block manual trigger if any run finished within this many minutes

  OpenAIApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Deprecated — use scripts/set-openai-key.sh (stores in SSM). Kept only for sam deploy compatibility.

  OpenAIApiKeyParam:
    Type: String
    Default: /lambda-linkedin-finder/openai-api-key
    Description: SSM Parameter Store path for OpenAI API key (SecureString)

  OpenAIModel:
    Type: String
    Default: gpt-4o-mini
    Description: OpenAI model for analysis recommendations

  WebUrl:
    Type: String
    Default: http://63.181.35.55
    Description: Public web app URL for OG share links (no trailing slash)

Conditions:
  UseSes: !Equals [!Ref EmailProvider, ses]

Resources:
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Health check and optional test email
      Handler: health.handler
      Policies:
        - !If
          - UseSes
          - Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
          - !Ref AWS::NoValue
      Events:
        HealthApi:
          Type: HttpApi
          Properties:
            Path: /health
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/health.ts

  FetchJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Fetch LinkedIn jobs across configured countries (Europe)
      Handler: fetch-jobs.handler
      Timeout: 600
      MemorySize: 512
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          SCRAPE_REGION: !Ref ScrapeRegion
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTableName
      Events:
        WorkingHoursCron:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 9-23 * * ? *)
            ScheduleExpressionTimezone: Europe/Sofia
            Description: Hourly job fetch 09:00–23:59 Sofia (rests 00:00–08:59)
            State: ENABLED
            FlexibleTimeWindow:
              Mode: "OFF"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/fetch-jobs.ts

  FetchJobsUsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Fetch LinkedIn jobs in the United States (LA timezone)
      Handler: fetch-jobs.handler
      Timeout: 600
      MemorySize: 512
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          SCRAPE_REGION: !Ref ScrapeRegionUs
          JOB_COUNTRIES: !Ref JobCountriesUs
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTableName
      Events:
        UsWorkingHoursCron:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 9-23 * * ? *)
            ScheduleExpressionTimezone: America/Los_Angeles
            Description: Hourly US job fetch 09:00–23:59 LA (rests 00:00–08:59)
            State: ENABLED
            FlexibleTimeWindow:
              Mode: "OFF"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/fetch-jobs.ts

  ListRunsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: List job fetch runs from DynamoDB
      Handler: list-runs.handler
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RunsTableName
      Events:
        ListRunsApi:
          Type: HttpApi
          Properties:
            Path: /runs
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/list-runs.ts

  GetRunFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Get a single job fetch run from DynamoDB
      Handler: get-run.handler
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RunsTableName
      Events:
        GetRunApi:
          Type: HttpApi
          Properties:
            Path: /runs/{fetchedAt}
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-run.ts

  TriggerFetchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Manual fetch trigger with strict rate limiting
      Handler: trigger-fetch.handler
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          FETCH_JOBS_FUNCTION_ARN: !GetAtt FetchJobsFunction.Arn
          FETCH_JOBS_US_FUNCTION_ARN: !GetAtt FetchJobsUsFunction.Arn
          MANUAL_FETCH_COOLDOWN_MINUTES: !Ref ManualFetchCooldownMinutes
          MANUAL_FETCH_MIN_GAP_MINUTES: !Ref ManualFetchMinGapMinutes
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt FetchJobsFunction.Arn
                - !GetAtt FetchJobsUsFunction.Arn
      Events:
        TriggerFetchStatusApi:
          Type: HttpApi
          Properties:
            Path: /runs/trigger
            Method: get
        TriggerFetchPostApi:
          Type: HttpApi
          Properties:
            Path: /runs/trigger
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/trigger-fetch.ts

  RunAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Background worker for market analyses
      Handler: run-analysis.handler
      Timeout: 600
      MemorySize: 1024
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          OPENAI_API_KEY_PARAM: !Ref OpenAIApiKeyParam
          OPENAI_MODEL: !Ref OpenAIModel
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTableName
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenAIApiKeyParam}"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/run-analysis.ts

  ListAnalysesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: List market analyses from DynamoDB
      Handler: list-analyses.handler
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RunsTableName
      Events:
        ListAnalysesApi:
          Type: HttpApi
          Properties:
            Path: /analyses
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/list-analyses.ts

  GetAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Get a single market analysis from DynamoDB
      Handler: get-analysis.handler
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          RUN_ANALYSIS_FUNCTION_ARN: !GetAtt RunAnalysisFunction.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt RunAnalysisFunction.Arn
      Events:
        GetAnalysisApi:
          Type: HttpApi
          Properties:
            Path: /analyses/{analysisId}
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-analysis.ts

  GetAnalysisShareFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Open Graph HTML preview for shared analysis links
      Handler: get-analysis-share.handler
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          WEB_URL: !Ref WebUrl
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RunsTableName
      Events:
        GetAnalysisShareApi:
          Type: HttpApi
          Properties:
            Path: /share/analyses/{analysisId}
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-analysis-share.ts

  StartAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Start a market analysis for a date period
      Handler: start-analysis.handler
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          RUN_ANALYSIS_FUNCTION_ARN: !GetAtt RunAnalysisFunction.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt RunAnalysisFunction.Arn
      Events:
        StartAnalysisApi:
          Type: HttpApi
          Properties:
            Path: /analyses
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/start-analysis.ts

  EnrichCompanyDomainsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Background worker to enrich company website domains with AI
      Handler: run-enrich-domains.handler
      Timeout: 600
      MemorySize: 512
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          OPENAI_API_KEY_PARAM: !Ref OpenAIApiKeyParam
          OPENAI_MODEL: !Ref OpenAIModel
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTableName
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenAIApiKeyParam}"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/run-enrich-domains.ts

  StartEnrichDomainsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Description: Start AI domain enrichment for analysis companies
      Handler: start-enrich-domains.handler
      Environment:
        Variables:
          RUNS_TABLE_NAME: !Ref RunsTableName
          ENRICH_DOMAINS_FUNCTION_ARN: !GetAtt EnrichCompanyDomainsFunction.Arn
          OPENAI_API_KEY_PARAM: !Ref OpenAIApiKeyParam
          OPENAI_MODEL: !Ref OpenAIModel
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTableName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt EnrichCompanyDomainsFunction.Arn
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenAIApiKeyParam}"
      Events:
        StartEnrichDomainsApi:
          Type: HttpApi
          Properties:
            Path: /analyses/{analysisId}/enrich-domains
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/start-enrich-domains.ts

Outputs:
  ApiEndpoint:
    Description: HTTP API base URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  HealthUrl:
    Description: Health check endpoint
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/health"
  HealthFunctionArn:
    Description: Health Lambda ARN
    Value: !GetAtt HealthFunction.Arn
  FetchJobsFunctionArn:
    Description: Fetch jobs Lambda ARN (Europe)
    Value: !GetAtt FetchJobsFunction.Arn
  FetchJobsUsFunctionArn:
    Description: Fetch jobs Lambda ARN (United States)
    Value: !GetAtt FetchJobsUsFunction.Arn
  JobRunsTableName:
    Description: DynamoDB table for fetch run history
    Value: !Ref RunsTableName
  JobRunsTableArn:
    Description: DynamoDB table ARN
    Value: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${RunsTableName}"
  RunsUrl:
    Description: List runs API endpoint
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/runs"
  AnalysesUrl:
    Description: Market analyses API endpoint
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/analyses"
  RunAnalysisFunctionArn:
    Description: Run analysis Lambda ARN
    Value: !GetAtt RunAnalysisFunction.Arn
